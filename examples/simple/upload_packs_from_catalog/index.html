<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDA Pack Catalog</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #242b3d;
            --accent: #00d4aa;
            --accent-hover: #00f5c4;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --border: #2d3548;
            --row-hover: #1e2536;
            --selected: rgba(0, 212, 170, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h1::before {
            content: '';
            width: 4px;
            height: 28px;
            background: var(--accent);
            border-radius: 2px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .search-box {
            flex: 1;
            max-width: 320px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.625rem 1rem 0.625rem 2.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.875rem;
            opacity: 0.6;
        }

        .selection-info {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .selection-info strong {
            color: var(--accent);
        }

        .table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead {
            background: var(--bg-tertiary);
        }

        th {
            padding: 0.875rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th:first-child {
            width: 50px;
        }


        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            vertical-align: top;
        }

        td:first-child {
            vertical-align: top;
            padding-top: 0.85rem;
        }

        tbody tr {
            transition: background 0.15s;
            cursor: pointer;
        }

        tbody tr:hover {
            background: var(--row-hover);
        }

        tbody tr.selected {
            background: var(--selected);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .pack-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .pack-version {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: 'SF Mono', 'Consolas', monospace;
            color: var(--accent);
        }

        .pack-description {
            color: var(--text-secondary);
            max-width: 300px;
        }

        .dependency-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .dependency-list li {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            background: var(--bg-tertiary);
            border-radius: 3px;
            font-size: 0.7rem;
            margin: 0.15rem 0.15rem 0.15rem 0;
            color: var(--text-secondary);
        }

        .dependency-list li .dep-version {
            color: var(--accent);
            margin-left: 0.25rem;
        }

        .actions {
            margin-top: 1.25rem;
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.625rem 1.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 2rem;
            color: #ff6b6b;
        }

        .no-deps {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.75rem;
        }

        .status-section {
            margin-top: 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            display: none;
        }

        .status-section.visible {
            display: block;
        }

        .status-header {
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-header::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        .status-summary {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .status-summary-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-summary-item.success {
            color: var(--accent);
        }

        .status-summary-item.error {
            color: #ff6b6b;
        }

        .status-details {
            margin-top: 0.75rem;
        }

        .status-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .status-list li {
            padding: 0.5rem 0.75rem;
            margin: 0.25rem 0;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.8rem;
            border-left: 3px solid transparent;
        }

        .status-list li.success {
            border-left-color: var(--accent);
            color: var(--text-primary);
        }

        .status-list li.error {
            border-left-color: #ff6b6b;
            color: #ff6b6b;
        }

        .status-list li .pack-info {
            font-weight: 500;
            margin-right: 0.5rem;
        }

        .status-list li .pack-message {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .pagination-info {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .pagination-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .pagination-btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .pagination-btn:hover:not(:disabled) {
            background: var(--bg-primary);
            border-color: var(--accent);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-page-info {
            color: var(--text-primary);
            font-size: 0.875rem;
            margin: 0 0.5rem;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>RDA Pack Catalog</h1>
        
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search packs...">
            </div>
            <div class="selection-info">
                <span id="selectionCount"><strong>0</strong> packs selected</span>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>Pack Name</th>
                        <th>Version</th>
                        <th>Description</th>
                        <th>Required Fabric Services</th>
                        <th>Required Base Packs</th>
                    </tr>
                </thead>
                <tbody id="packTableBody">
                    <tr>
                        <td colspan="6">
                            <div class="loading">
                                <div class="spinner"></div>
                                <div>Loading catalog...</div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination" style="display: none;">
            <div class="pagination-info" id="paginationInfo"></div>
            <div class="pagination-controls">
                <button class="pagination-btn" id="prevBtn" onclick="previousPage()" disabled>Previous</button>
                <span class="pagination-page-info" id="pageInfo"></span>
                <button class="pagination-btn" id="nextBtn" onclick="nextPage()" disabled>Next</button>
            </div>
        </div>

        <div class="status-section" id="statusSection">
            <div class="status-header">Upload Status</div>
            <div class="status-summary" id="statusSummary"></div>
            <div class="status-details" id="statusDetails"></div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" onclick="clearSelection()">Clear Selection</button>
            <button class="btn btn-primary" id="uploadBtn" disabled onclick="uploadSelected()">
                Upload Selected
            </button>
        </div>
    </div>

    <script>
        let packsData = [];
        let selectedPacks = new Set();
        let filteredPacks = []; // Packs after search/filter
        let currentPage = 1;
        const itemsPerPage = 10;

        function getPackKey(pack) {
            return `${pack.pack_name}::${pack.pack_version}`;
        }

        /**
         * Compare two version strings using Python PEP 440 versioning rules
         * Returns: -1 if v1 < v2, 0 if v1 == v2, 1 if v1 > v2
         * Handles common Python version formats: 1.2.3, 1.2.3a1, 1.2.3b1, 1.2.3rc1, 1.2.3.post1, 1.2.3.dev1
         */
        function compareVersions(v1, v2) {
            if (!v1 || !v2) return 0;
            
            // Normalize versions: remove leading/trailing whitespace
            v1 = v1.trim();
            v2 = v2.trim();
            
            if (v1 === v2) return 0;
            
            // Parse version into segments: [epoch, release, pre, post, dev]
            // PEP 440 format: [N!]N(.N)*[{a|b|rc}N][.postN][.devN]
            const parseVersion = (v) => {
                // Handle epoch (e.g., "1!2.3.4")
                let epoch = 0;
                if (v.includes('!')) {
                    const parts = v.split('!');
                    epoch = parseInt(parts[0], 10) || 0;
                    v = parts[1];
                }
                
                let release = v;
                let pre = null;
                let post = null;
                let dev = null;
                
                // Parse in order: dev (last), post (before dev), pre (before post)
                // Pattern: release [pre] [post] [dev]
                
                // Check for dev (must be last, format: .devN)
                const devMatch = v.match(/^(.+?)(\.dev)(\d+)$/);
                if (devMatch) {
                    release = devMatch[1];
                    dev = { type: 'dev', num: parseInt(devMatch[3], 10) };
                    v = release;
                }
                
                // Check for post (format: .postN, can be before dev)
                const postMatch = v.match(/^(.+?)(\.post)(\d+)$/);
                if (postMatch) {
                    release = postMatch[1];
                    post = parseInt(postMatch[3], 10);
                    v = release;
                }
                
                // Check for pre (alpha, beta, rc) - format: aN, bN, rcN (no dot before)
                // This can appear after release numbers but before .post or .dev
                const preMatch = v.match(/^(.+?)(a|b|rc)(\d+)$/);
                if (preMatch) {
                    release = preMatch[1];
                    const preType = preMatch[2];
                    const preNum = parseInt(preMatch[3], 10);
                    // Order: a < b < rc
                    const preOrder = { 'a': 0, 'b': 1, 'rc': 2 };
                    pre = { type: preOrder[preType] || 0, num: preNum };
                }
                
                // Parse release segment (e.g., "1.2.3")
                // Remove any trailing dots
                release = release.replace(/\.+$/, '');
                const releaseParts = release.split('.').map(p => {
                    const num = parseInt(p, 10);
                    return isNaN(num) ? 0 : num;
                });
                
                return { epoch, release: releaseParts, pre, post, dev };
            };
            
            const parsed1 = parseVersion(v1);
            const parsed2 = parseVersion(v2);
            
            // Compare epoch
            if (parsed1.epoch !== parsed2.epoch) {
                return parsed1.epoch > parsed2.epoch ? 1 : -1;
            }
            
            // Compare release segments
            const maxReleaseLen = Math.max(parsed1.release.length, parsed2.release.length);
            for (let i = 0; i < maxReleaseLen; i++) {
                const r1 = parsed1.release[i] || 0;
                const r2 = parsed2.release[i] || 0;
                if (r1 !== r2) {
                    return r1 > r2 ? 1 : -1;
                }
            }
            
            // Pre-release versions are less than final releases
            if (parsed1.pre && !parsed2.pre) return -1;
            if (!parsed1.pre && parsed2.pre) return 1;
            
            // Compare pre-release versions
            if (parsed1.pre && parsed2.pre) {
                if (parsed1.pre.type !== parsed2.pre.type) {
                    return parsed1.pre.type > parsed2.pre.type ? 1 : -1;
                }
                if (parsed1.pre.num !== parsed2.pre.num) {
                    return parsed1.pre.num > parsed2.pre.num ? 1 : -1;
                }
            }
            
            // Post-release versions are greater than final releases
            if (parsed1.post && !parsed2.post) return 1;
            if (!parsed1.post && parsed2.post) return -1;
            if (parsed1.post && parsed2.post) {
                if (parsed1.post !== parsed2.post) {
                    return parsed1.post > parsed2.post ? 1 : -1;
                }
            }
            
            // Dev versions are less than non-dev versions
            if (parsed1.dev && !parsed2.dev) return -1;
            if (!parsed1.dev && parsed2.dev) return 1;
            if (parsed1.dev && parsed2.dev) {
                if (parsed1.dev.num !== parsed2.dev.num) {
                    return parsed1.dev.num > parsed2.dev.num ? 1 : -1;
                }
            }
            
            return 0;
        }

        /**
         * Fetch installed services from fabric health APIs
         * 
         * Maps:
         * - pod_type -> key in installedServices map
         * - build_tag -> version value in installedServices map
         * 
         * This matches the required_fabric_services structure where:
         * - required_fabric_services[].name matches pod_type
         * - required_fabric_services[].version (specifier like ">=8.0.0") is checked against build_tag using SpecifierSet logic
         * 
         * Returns: { servicesMap: Map, rawData: { workers, core, app } }
         */
        async function fetchInstalledServices() {
            const installedServices = new Map(); // pod_type -> { version: build_tag, isSemantic }
            const rawData = {
                workers: null,
                core: null,
                app: null
            };
            
            try {
                // Fetch workers
                const workersResponse = await fetch('/api/v2/fabric_health/workers?offset=0&limit=100', {
                    headers: { 'accept': 'application/json' }
                });
                if (workersResponse.ok) {
                    const workersData = await workersResponse.json();
                    rawData.workers = workersData;
                    const workers = workersData.worker || [];
                    for (const worker of workers) {
                        const podType = worker.pod_type;
                        const buildTag = worker.build_tag;
                        if (podType && buildTag) {
                            updateServiceVersion(installedServices, podType, buildTag);
                        }
                    }
                }
            } catch (err) {
                // console.warn('Failed to fetch workers:', err);
                rawData.workers = { error: err.message };
            }
            
            try {
                // Fetch core microservices
                const coreResponse = await fetch('/api/v2/fabric_health/microservices/core?offset=0&limit=100', {
                    headers: { 'accept': 'application/json' }
                });
                if (coreResponse.ok) {
                    const coreData = await coreResponse.json();
                    rawData.core = coreData;
                    const coreServices = coreData.core_microservices || [];
                    for (const service of coreServices) {
                        const podType = service.pod_type;
                        const buildTag = service.build_tag;
                        if (podType && buildTag) {
                            updateServiceVersion(installedServices, podType, buildTag);
                        }
                    }
                }
            } catch (err) {
                // console.warn('Failed to fetch core microservices:', err);
                rawData.core = { error: err.message };
            }
            
            try {
                // Fetch app microservices
                const appResponse = await fetch('/api/v2/fabric_health/microservices/app?offset=0&limit=100', {
                    headers: { 'accept': 'application/json' }
                });
                if (appResponse.ok) {
                    const appData = await appResponse.json();
                    rawData.app = appData;
                    const appServices = appData.app_microservices || [];
                    for (const service of appServices) {
                        const podType = service.pod_type;
                        const buildTag = service.build_tag;
                        if (podType && buildTag) {
                            updateServiceVersion(installedServices, podType, buildTag);
                        }
                    }
                }
            } catch (err) {
                // console.warn('Failed to fetch app microservices:', err);
                rawData.app = { error: err.message };
            }
            
            return { servicesMap: installedServices, rawData: rawData };
        }


        /**
         * Check if a version string is valid PEP 440 (can be parsed as semantic version)
         * Returns: { isValid: boolean, isSemantic: boolean }
         * If parsing fails, it's non-semantic (like daily builds, RC builds)
         */
        function tryParsePEP440Version(versionStr) {
            if (!versionStr || typeof versionStr !== 'string') {
                return { isValid: false, isSemantic: false };
            }
            
            const trimmed = versionStr.trim();
            
            // Check for non-semantic indicators (daily, RC, dev, alpha, beta)
            // This should match "daily-82", "daily", "RC1", "dev1", etc.
            const nonSemanticPatterns = /daily|rc|dev|alpha|beta/i;
            const isNonSemantic = nonSemanticPatterns.test(trimmed);
            if (isNonSemantic) {
                // console.log(`      [PEP440] Version '${trimmed}' detected as NON-SEMANTIC (contains daily/rc/dev/alpha/beta)`);
                return { isValid: true, isSemantic: false };
            }
            
            // Try to parse as PEP 440 version
            // Basic PEP 440 pattern: [N!]N(.N)*[{a|b|rc}N][.postN][.devN]
            // Simplified check: starts with digit, contains dots, no invalid characters
            const pep440Pattern = /^(\d+!)?\d+(\.\d+)*([a-z]+\d+)?(\.post\d+)?(\.dev\d+)?$/i;
            
            if (pep440Pattern.test(trimmed)) {
                // Additional validation: try to compare versions
                try {
                    // If we can extract numeric parts, it's likely semantic
                    const parts = trimmed.split(/[!a-z]/i);
                    if (parts.length > 0 && /^\d+/.test(parts[0])) {
                        return { isValid: true, isSemantic: true };
                    }
                } catch (e) {
                    // Parsing failed
                }
            }
            
            // If it doesn't match PEP 440 pattern but doesn't have non-semantic indicators,
            // it might still be a version string (like "1.2.3")
            if (/^\d+\.\d+/.test(trimmed)) {
                return { isValid: true, isSemantic: true };
            }
            
            return { isValid: true, isSemantic: false };
        }

        /**
         * Update service version map, keeping the highest version for each service
         * Uses PEP 440 parsing to determine if version is semantic
         */
        function updateServiceVersion(installedServices, serviceName, versionStr) {
            if (!serviceName || !versionStr) return;
            
            // Use PEP 440 parsing to determine if version is semantic
            const versionCheck = tryParsePEP440Version(versionStr);
            const versionObj = { 
                version: versionStr, 
                isSemantic: versionCheck.isSemantic 
            };
            
            if (!installedServices.has(serviceName)) {
                installedServices.set(serviceName, versionObj);
            } else {
                const existing = installedServices.get(serviceName);
                // If new version is semantic and existing is not, prefer semantic
                if (versionCheck.isSemantic && !existing.isSemantic) {
                    installedServices.set(serviceName, versionObj);
                } else if (!versionCheck.isSemantic && existing.isSemantic) {
                    // Keep existing semantic version
                } else {
                    // Both semantic or both non-semantic - compare versions
                    if (compareVersions(versionStr, existing.version) > 0) {
                        installedServices.set(serviceName, versionObj);
                    }
                }
            }
        }

        /**
         * Check if a version specifier (like ">=1.2.3") matches an installed version
         * Simplified version of Python's SpecifierSet.contains()
         * Handles: >=, <=, ==, >, <, ~=, !=, and comma-separated multiple specifiers
         */
        function versionSpecifierMatches(specifier, installedVersion) {
            // Remove whitespace
            specifier = specifier.trim();
            installedVersion = installedVersion.trim();
            
            // Handle ==* (any version)
            if (specifier === '==*' || specifier === '*') {
                return true;
            }
            
            // Handle multiple specifiers separated by commas (e.g., ">=1.2.3,<2.0.0")
            const specifiers = specifier.split(',').map(s => s.trim());
            
            // All specifiers must match
            for (const singleSpec of specifiers) {
                if (!versionSpecifierMatchesSingle(singleSpec, installedVersion)) {
                    return false;
                }
            }
            
            return true;
        }

        /**
         * Check a single version specifier
         */
        function versionSpecifierMatchesSingle(specifier, installedVersion) {
            // Extract operator and version
            const operators = ['>=', '<=', '==', '!=', '~=', '>', '<'];
            let operator = '';
            let requiredVersion = specifier;
            
            for (const op of operators) {
                if (specifier.startsWith(op)) {
                    operator = op;
                    requiredVersion = specifier.substring(op.length).trim();
                    break;
                }
            }
            
            // If no operator, assume ==
            if (!operator) {
                operator = '==';
            }
            
            const comparison = compareVersions(installedVersion, requiredVersion);
            
            switch (operator) {
                case '==':
                    return comparison === 0;
                case '>=':
                    return comparison >= 0;
                case '<=':
                    return comparison <= 0;
                case '>':
                    return comparison > 0;
                case '<':
                    return comparison < 0;
                case '!=':
                    return comparison !== 0;
                case '~=':
                    // Compatible release: >= version, < next major version
                    // For ~=1.2.3, we need: >=1.2.3 and <2.0.0
                    // Simplified: check if installed >= required and same major version
                    if (comparison < 0) return false;
                    const requiredParts = requiredVersion.split('.');
                    const installedParts = installedVersion.split('.');
                    if (requiredParts.length > 0 && installedParts.length > 0) {
                        const requiredMajor = parseInt(requiredParts[0], 10) || 0;
                        const installedMajor = parseInt(installedParts[0], 10) || 0;
                        return installedMajor === requiredMajor;
                    }
                    return comparison >= 0;
                default:
                    return false;
            }
        }

        /**
         * Check if a specifier string is valid PEP 440 SpecifierSet
         * Returns: { isValid: boolean, isSemantic: boolean }
         */
        function tryParsePEP440Specifier(specifierStr) {
            if (!specifierStr || typeof specifierStr !== 'string') {
                return { isValid: false, isSemantic: false };
            }
            
            const trimmed = specifierStr.trim();
            
            // Handle ==* (any version)
            if (trimmed === '==*' || trimmed === '*') {
                return { isValid: true, isSemantic: true };
            }
            
            // Check if it contains valid operators
            const validOperators = ['>=', '<=', '==', '!=', '~=', '>', '<'];
            let hasOperator = false;
            for (const op of validOperators) {
                if (trimmed.startsWith(op)) {
                    hasOperator = true;
                    break;
                }
            }
            
            if (!hasOperator && !/^\d+/.test(trimmed)) {
                // No operator and doesn't start with digit - likely invalid
                return { isValid: false, isSemantic: false };
            }
            
            // Extract version part after operator
            let versionPart = trimmed;
            for (const op of validOperators) {
                if (trimmed.startsWith(op)) {
                    versionPart = trimmed.substring(op.length).trim();
                    break;
                }
            }
            
            // Check if the version part is valid PEP 440
            const versionCheck = tryParsePEP440Version(versionPart);
            if (!versionCheck.isValid) {
                return { isValid: false, isSemantic: false };
            }
            
            // If version part is semantic, the specifier is semantic
            return { isValid: true, isSemantic: versionCheck.isSemantic };
        }

        /**
         * Check if required fabric services are compatible with installed services
         * Matches _check_fabric_service_compatibility logic from Python exactly
         * 
         * Note: 
         * - service.name in required_fabric_services matches pod_type in installed services
         * - service.version in required_fabric_services is checked against build_tag using SpecifierSet logic
         * - If installed build_tag is NOT PEP 440 compliant (non-semantic like "daily-82"), skip the check entirely
         */
        function checkFabricServiceCompatibility(requiredServices, installedServices) {
            if (!requiredServices || !Array.isArray(requiredServices) || requiredServices.length === 0) {
                return true; // No requirements means compatible
            }
            
            // DEBUG: Display installedServices value passed to this function
            // const installedServicesObj = {};
            // for (const [key, value] of installedServices.entries()) {
            //     installedServicesObj[key] = {
            //         version: value.version,
            //         isSemantic: value.isSemantic
            //     };
            // }
            // console.log('🔍 DEBUG: installedServices passed to checkFabricServiceCompatibility:', installedServicesObj);
            // console.log('🔍 DEBUG: installedServices Map size:', installedServices.size);
            // console.log('🔍 DEBUG: installedServices Map keys:', Array.from(installedServices.keys()));
            
            // console.log(`Checking compatibility for ${requiredServices.length} required services`);
            
            for (const service of requiredServices) {
                // Handle both object format {name: "...", version: "..."} and Map-like format
                const serviceName = service.name || (typeof service.get === 'function' ? service.get('name') : null);
                const requiredVersion = service.version || (typeof service.get === 'function' ? service.get('version') : null);
                
                if (!serviceName || !requiredVersion) {
                    // console.warn(`Skipping service requirement with missing name or version:`, service);
                    continue;
                }
                
                // console.log(`  → Checking required service: '${serviceName}' with version specifier '${requiredVersion}'`);
                
                // Check if the service is installed (service.name should match pod_type)
                // Try exact match first, then case-insensitive match
                let installedService = null;
                let matchedKey = null;
                
                if (installedServices.has(serviceName)) {
                    matchedKey = serviceName;
                    installedService = installedServices.get(serviceName);
                    // console.log(`    Found service '${serviceName}' (exact match)`);
                } else {
                    // Try case-insensitive match
                    for (const [key, value] of installedServices.entries()) {
                        if (key.toLowerCase() === serviceName.toLowerCase()) {
                            matchedKey = key;
                            installedService = value;
                            // console.log(`    Found service '${serviceName}' (case-insensitive match, actual key: '${key}')`);
                            break;
                        }
                    }
                }
                
                if (!installedService) {
                    // console.log(`    ✗ Service '${serviceName}' (pod_type) is NOT installed. Available services:`, Array.from(installedServices.keys()));
                    return false;
                }
                
                const installedVersion = installedService.version; // This is build_tag
                // console.log(`    Installed service '${matchedKey}' has build_tag: '${installedVersion}'`);
                
                // IMPORTANT: First check if installed version (build_tag) is PEP 440 compliant
                // If the installed build_tag is NOT PEP 440 compliant (non-semantic), skip the compatibility check entirely
                let installedVersionIsSemantic = false;
                try {
                    const versionCheck = tryParsePEP440Version(installedVersion);
                    installedVersionIsSemantic = versionCheck.isSemantic;
                    // console.log(`    build_tag '${installedVersion}' isSemantic: ${installedVersionIsSemantic}`);
                    
                    if (!installedVersionIsSemantic) {
                        // Installed build_tag is not PEP 440 compliant - skip compatibility check for this service
                        // console.log(`    ⏭ SKIPPING compatibility check for service '${matchedKey}': build_tag '${installedVersion}' is NOT PEP 440 compliant (non-semantic like daily/RC builds)`);
                        continue; // Skip this service requirement and continue to next one
                    }
                } catch (e) {
                    // If we can't parse the version, treat it as non-semantic and skip
                    // console.log(`    ⏭ SKIPPING compatibility check for service '${matchedKey}': build_tag '${installedVersion}' is NOT PEP 440 compliant (parse error: ${e.message})`);
                    continue; // Skip this service requirement and continue to next one
                }
                
                // Installed version is PEP 440 compliant - proceed with compatibility check
                // Check if required version specifier is semantic (like SpecifierSet in Python)
                // The requiredVersion is a specifier like ">=8.0.0" that should be checked using SpecifierSet.contains()
                let requiredVersionIsSemantic = false;
                let specSetValid = false;
                try {
                    const specCheck = tryParsePEP440Specifier(requiredVersion);
                    specSetValid = specCheck.isValid;
                    requiredVersionIsSemantic = specCheck.isSemantic;
                    if (!specSetValid) {
                        // console.warn(`Required version specifier '${requiredVersion}' for Service ${serviceName} is not valid PEP 440, will bypass strict validation`);
                    }
                } catch (e) {
                    // console.warn(`Required version specifier '${requiredVersion}' for Service ${serviceName} is not valid PEP 440, will bypass strict validation:`, e);
                }
                
                // Perform validation based on version types (matching Python logic exactly)
                // Use SpecifierSet.contains() logic when both are semantic
                if (requiredVersionIsSemantic && installedVersionIsSemantic) {
                    // Both are semantic - use strict version checking (like spec_set.contains() in Python)
                    const matches = versionSpecifierMatches(requiredVersion, installedVersion);
                    if (!matches) {
                        // console.log(`✗ Service '${matchedKey}' build_tag '${installedVersion}' does NOT satisfy requirement '${requiredVersion}' (SpecifierSet check failed)`);
                        return false;
                    } else {
                        // console.log(`✓ Service '${matchedKey}' build_tag '${installedVersion}' satisfies requirement '${requiredVersion}' (SpecifierSet check passed)`);
                    }
                } else {
                    // Required version specifier is non-semantic - bypass strict validation
                    // (We already skipped if installed version was non-semantic above)
                    // console.log(`    ⚠ Skipping strict SpecifierSet validation for Service '${matchedKey}': required specifier '${requiredVersion}' is not semantic`);
                }
            }
            
            // console.log(`  ✓ All required services passed compatibility check (some may have been skipped due to non-semantic build_tags)`);
            return true;
        }

        /**
         * Filter packs by fabric service compatibility
         */
        function filterPacksByCompatibility(packs, installedServices) {
            const compatiblePacks = [];
            const skippedPacks = [];
            
            for (const pack of packs) {
                const packName = pack.pack_name;
                const packVersion = pack.pack_version;
                
                if (!packName || !packVersion) {
                    // console.warn(`Skipping pack with missing name or version:`, pack);
                    continue;
                }
                
                // Check fabric service compatibility
                if (pack.required_fabric_services && Array.isArray(pack.required_fabric_services) && pack.required_fabric_services.length > 0) {
                    // console.group(`📦 Pack: ${packName} ${packVersion}`);
                    // console.log(`Required services:`, pack.required_fabric_services.map(s => `${s.name} ${s.version}`).join(', '));
                    const isCompatible = checkFabricServiceCompatibility(pack.required_fabric_services, installedServices);
                    if (isCompatible) {
                        compatiblePacks.push(pack);
                        // console.log(`✅ RESULT: Pack ${packName} ${packVersion} is COMPATIBLE`);
                    } else {
                        skippedPacks.push({ name: packName, version: packVersion });
                        // console.log(`❌ RESULT: Pack ${packName} ${packVersion} is NOT COMPATIBLE`);
                    }
                    // console.groupEnd();
                } else {
                    // If no required_fabric_services specified, include the pack
                    compatiblePacks.push(pack);
                    // console.log(`✓ Pack ${packName} ${packVersion} has no requirements, including it`);
                }
            }
            
            // if (skippedPacks.length > 0) {
            //     console.group('Skipped Packs (incompatible):');
            //     skippedPacks.forEach(p => console.log(`  - ${p.name} ${p.version}`));
            //     console.groupEnd();
            // }
            
            return compatiblePacks;
        }

        /**
         * Filter packs to show only the latest version of each pack
         */
        function filterLatestVersions(packs) {
            const packMap = new Map();
            
            for (const pack of packs) {
                const packName = pack.pack_name;
                const packVersion = pack.pack_version;
                
                if (!packName || !packVersion) continue;
                
                if (!packMap.has(packName)) {
                    packMap.set(packName, pack);
                } else {
                    const existingPack = packMap.get(packName);
                    const existingVersion = existingPack.pack_version;
                    
                    // Compare versions and keep the latest
                    if (compareVersions(packVersion, existingVersion) > 0) {
                        packMap.set(packName, pack);
                    }
                }
            }
            
            return Array.from(packMap.values());
        }

        function formatDependencies(deps) {
            if (!deps || !Array.isArray(deps) || deps.length === 0) {
                return '<span class="no-deps">None</span>';
            }
            return `<ul class="dependency-list">${deps.map(d => 
                `<li>${d.name}<span class="dep-version">${d.version}</span></li>`
            ).join('')}</ul>`;
        }

        function renderTable(packs) {
            // Store filtered packs for pagination
            filteredPacks = packs;
            
            const tbody = document.getElementById('packTableBody');
            
            if (packs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">No packs found</td></tr>';
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            // Calculate pagination
            const totalPages = Math.ceil(packs.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pagePacks = packs.slice(startIndex, endIndex);

            // Render only packs for current page
            tbody.innerHTML = pagePacks.map((pack, idx) => {
                const packKey = getPackKey(pack);
                const globalIdx = startIndex + idx;
                return `
                <tr class="${selectedPacks.has(packKey) ? 'selected' : ''}" data-key="${packKey}">
                    <td><input type="checkbox" ${selectedPacks.has(packKey) ? 'checked' : ''} data-idx="${globalIdx}"></td>
                    <td class="pack-name">${pack.pack_name || 'N/A'}</td>
                    <td><span class="pack-version">${pack.pack_version || 'N/A'}</span></td>
                    <td class="pack-description">${pack.description || '-'}</td>
                    <td>${formatDependencies(pack.required_fabric_services)}</td>
                    <td>${formatDependencies(pack.required_base_packs)}</td>
                </tr>
            `}).join('');

            tbody.querySelectorAll('tr').forEach(row => {
                row.addEventListener('click', (e) => {
                    if (e.target.type !== 'checkbox') {
                        const checkbox = row.querySelector('input[type="checkbox"]');
                        checkbox.checked = !checkbox.checked;
                        toggleSelection(row.dataset.key, checkbox.checked);
                    }
                });

                row.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
                    toggleSelection(row.dataset.key, e.target.checked);
                });
            });

            // Update pagination controls
            updatePagination(packs.length, totalPages);
        }

        function updatePagination(totalItems, totalPages) {
            const pagination = document.getElementById('pagination');
            const paginationInfo = document.getElementById('paginationInfo');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (totalItems <= itemsPerPage) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            
            // Update info
            const startItem = (currentPage - 1) * itemsPerPage + 1;
            const endItem = Math.min(currentPage * itemsPerPage, totalItems);
            paginationInfo.textContent = `Showing ${startItem}-${endItem} of ${totalItems} packs`;
            pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;

            // Update buttons
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages;
        }

        function nextPage() {
            const totalPages = Math.ceil(filteredPacks.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable(filteredPacks);
            }
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable(filteredPacks);
            }
        }

        function toggleSelection(key, isSelected) {
            if (isSelected) {
                selectedPacks.add(key);
            } else {
                selectedPacks.delete(key);
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('selectionCount').innerHTML = 
                `<strong>${selectedPacks.size}</strong> pack${selectedPacks.size !== 1 ? 's' : ''} selected`;
            document.getElementById('uploadBtn').disabled = selectedPacks.size === 0;
            
            // Check if all items on current page are selected
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pagePacks = filteredPacks.slice(startIndex, endIndex);
            const allPageSelected = pagePacks.length > 0 && pagePacks.every(p => selectedPacks.has(getPackKey(p)));
            document.getElementById('selectAll').checked = allPageSelected;

            document.querySelectorAll('#packTableBody tr').forEach(row => {
                row.classList.toggle('selected', selectedPacks.has(row.dataset.key));
            });
        }

        function clearSelection() {
            selectedPacks.clear();
            document.querySelectorAll('#packTableBody input[type="checkbox"]').forEach(cb => cb.checked = false);
            updateUI();
            // Hide status section when clearing selection
            document.getElementById('statusSection').classList.remove('visible');
        }

                </div>
                <div class="status-summary-item error">
                    <span>✗</span>
                    <span><strong>${results.failed.length}</strong> failed</span>

            let detailsHTML = '';
            
            if (results.success.length > 0) {
                detailsHTML += '<div style="margin-bottom: 0.75rem;"><strong style="color: var(--accent);">Successful uploads:</strong></div>';
                detailsHTML += '<ul class="status-list">';

                if (results.success.length > 0) {
                    detailsHTML += '<div style="margin-top: 1rem; margin-bottom: 0.75rem;"><strong style="color: #ff6b6b;">Failed uploads:</strong></div>';
                } else {
                    detailsHTML += '<div style="margin-bottom: 0.75rem;"><strong style="color: #ff6b6b;">Failed uploads:</strong></div>';
                }
                detailsHTML += '<ul class="status-list">';
                results.failed.forEach(f => {
                    detailsHTML += `
                        <li class="error">
                            <span class="pack-info">${f.pack} (${f.version})</span>
                            <span class="pack-message">${f.error}</span>

        }

        async function uploadSelected() {
            const selected = packsData.filter(p => selectedPacks.has(getPackKey(p)));
            // console.log('Uploading packs:', selected);

            if (selected.length === 0) {
                alert('No packs selected');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            const originalText = uploadBtn.textContent;
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const results = {
                success: [],
                failed: []
            };

            // Upload each pack individually
            for (let i = 0; i < selected.length; i++) {
                const pack = selected[i];
                const packName = pack.pack_name || 'Unknown';
                const packVersion = pack.pack_version || 'Unknown';
                const tarFileUrl = pack.tar_file_url;

                if (!tarFileUrl) {
                    // console.error(`Pack ${packName} (${packVersion}) has no tar_file_url`);
                    results.failed.push({ pack: packName, version: packVersion, error: 'Missing tar_file_url' });
                    continue;
                }

                try {
                    uploadBtn.textContent = `Uploading ${i + 1}/${selected.length}: ${packName}...`;

                    // Fetch the tar file from the URL
                    const tarResponse = await fetch(tarFileUrl);
                    if (!tarResponse.ok) {
                        throw new Error(`Failed to fetch tar file: HTTP ${tarResponse.status}`);
                    }

                    // Convert response to blob
                    const tarBlob = await tarResponse.blob();

                    // Create FormData for multipart/form-data upload
                    const formData = new FormData();
                    const fileName = tarFileUrl.split('/').pop() || `${packName}_${packVersion}.tar.gz`;
                    formData.append('file', tarBlob, fileName);

                    // Upload the file
                    const uploadResponse = await fetch('/api/v2/packs/upload', {
                        method: 'POST',
                        headers: {
                            'accept': 'application/json'
                            // Don't set Content-Type header - browser will set it with boundary for multipart/form-data
                        },
                        body: formData
                    });

                    // Parse the response - try JSON first, fallback to text
                    let result;
                    try {
                        result = await uploadResponse.json();
                    } catch (err) {
                        // If JSON parsing fails, try to get text response
                        const errorText = await uploadResponse.text().catch(() => '');
                        if (!uploadResponse.ok) {
                            throw new Error(`HTTP ${uploadResponse.status}: ${errorText || 'Unknown error'}`);
                        }
                        throw new Error(`Failed to parse response: ${errorText || err.message}`);
                    }

                    // Check for error response with "detail" field (common error format)
                    if (result.detail) {
                        throw new Error(result.detail);
                    }

                    // Check the API response structure for success response
                    const serviceError = result.serviceError;
                    const serviceResult = result.serviceResult || {};
                    const status = serviceResult.status;
                    const statusMessage = serviceResult.statusMessage || 'Unknown status';

                    // Check if there's a service error or if status is not SUBMIT_OK
                    if (serviceError && serviceError !== 'none') {
                        throw new Error(`Service error: ${serviceError}${statusMessage ? ` - ${statusMessage}` : ''}`);
                    }

                    if (status === 'SUBMIT_OK') {
                        // console.log(`Successfully uploaded ${packName} (${packVersion})`, {
                        //     statusMessage: statusMessage,
                        //     created: result.created,
                        //     completed: result.completed
                        // });
                        results.success.push({ 
                            pack: packName, 
                            version: packVersion,
                            message: statusMessage
                        });
                    } else {
                        // If HTTP is OK but status is not SUBMIT_OK, it's still a failure
                        throw new Error(`Upload failed: ${statusMessage || status || 'Unknown error'}`);
                    }
                } catch (err) {
                    // console.error(`Failed to upload ${packName} (${packVersion}):`, err);
                    results.failed.push({ pack: packName, version: packVersion, error: err.message });
                }
            }

            // Reset button
            uploadBtn.disabled = false;
            uploadBtn.textContent = originalText;

            // Display results in the status section
            displayUploadResults(results);

            // Show results in popup as well
            let message = `Upload completed:\n`;
            message += `✓ Success: ${results.success.length}\n`;
            message += `✗ Failed: ${results.failed.length}`;
            
            if (results.success.length > 0) {
                message += `\n\nSuccessful uploads:\n`;
                results.success.forEach(s => {
                    message += `- ${s.pack} (${s.version})`;
                    if (s.message) {
                        message += `: ${s.message}`;
                    }
                    message += `\n`;
                });
            }
            
            if (results.failed.length > 0) {
                message += `\n\nFailed packs:\n`;
                results.failed.forEach(f => {
                    message += `- ${f.pack} (${f.version}): ${f.error}\n`;
                });
            }

            alert(message);

            // Clear selection after successful upload
            if (results.failed.length === 0 && results.success.length > 0) {
                clearSelection();
            }
        }

        document.getElementById('selectAll').addEventListener('change', (e) => {
            // Select/deselect only items on current page
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pagePacks = filteredPacks.slice(startIndex, endIndex);
            
            if (e.target.checked) {
                pagePacks.forEach(p => selectedPacks.add(getPackKey(p)));
            } else {
                pagePacks.forEach(p => selectedPacks.delete(getPackKey(p)));
            }
            
            document.querySelectorAll('#packTableBody input[type="checkbox"]').forEach(cb => {
                cb.checked = e.target.checked;
            });
            updateUI();
        });

        (async () => {
            try {
                packsData = await checkCatalogAccess();
                currentPage = 1; // Reset to first page on initial load
                renderTable(packsData);
            } catch (err) {
                document.getElementById('packTableBody').innerHTML = 
                    `<tr><td colspan="6" class="error">Failed to load catalog: ${err.message}</td></tr>`;
            }
        })();
    </script>
</body>
</html>
