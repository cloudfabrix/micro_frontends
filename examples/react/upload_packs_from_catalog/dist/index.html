<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RDA Pack Catalog</title>
    <style>
      /* Prevent white flash on initial load */
      html, body {
        margin: 0;
        padding: 0;
        background-color: #161B21; /* Dark theme default background */
        color: #FAFAFA; /* Dark theme default text */
        font-family: Avenir, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #root {
        min-height: 100vh;
        background-color: inherit;
      }
      /* Light theme support - will be overridden by React when theme is detected */
      html[data-theme="light"], html[data-theme="light"] body {
        background-color: #f9f9f9;
        color: #212121;
      }
    </style>
    <script>
      // Detect theme immediately before React loads to prevent flash
      (function() {
        try {
          // Check if we're in an iframe and can access parent
          if (window.parent && window.parent !== window) {
            try {
              const parentStyles = window.parent.getComputedStyle(window.parent.document.documentElement);
              // Check multiple possible background variable names
              const bgColor = parentStyles.getPropertyValue('--v-theme-background') || 
                             parentStyles.getPropertyValue('--v-theme-cfxbackground');
              // If background is white or light, it's light theme
              const isLightTheme = bgColor && (
                bgColor === "255,255,255" || 
                bgColor.includes("249,249,249") ||
                bgColor.includes("255, 255, 255") ||
                bgColor.includes("249, 249, 249")
              );
              if (isLightTheme) {
                document.documentElement.setAttribute('data-theme', 'light');
              }
            } catch (e) {
              // Cross-origin or other error, fall back to system preference
              const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
              if (!isDarkMode) {
                document.documentElement.setAttribute('data-theme', 'light');
              }
            }
          } else {
            // Not in iframe, use system preference
            const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!isDarkMode) {
              document.documentElement.setAttribute('data-theme', 'light');
            }
          }
        } catch (e) {
          // Fallback to system preference on any error
          const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (!isDarkMode) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        }
      })();
    </script>
    <script type="module" crossorigin src="/index-UTcMN4Gy.js"></script>
    <link rel="stylesheet" crossorigin href="/style-jWfk7OSi.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- The main script is loaded as a module via Vite -->
  </body>
</html>
